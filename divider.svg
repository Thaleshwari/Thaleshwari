<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 24" width="100%" height="24">
  <defs>
    <!-- Gradient for the line -->
    <linearGradient id="divGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0" />
      <stop offset="25%" stop-color="#8A2BE2" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="1" />
      <stop offset="75%" stop-color="#8A2BE2" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0" />
    </linearGradient>
    
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    :root {
      --node-color: #00F0FF;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --node-color: #8A2BE2;
      }
    }
    
    @keyframes linePulse {
      0% { opacity: 0.4; stroke-width: 1.5; }
      50% { opacity: 1; stroke-width: 2.2; }
      100% { opacity: 0.4; stroke-width: 1.5; }
    }
    
    @keyframes nodePulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    
    .divider-line {
      animation: linePulse 4s ease-in-out infinite;
    }
    
    .divider-node {
      animation: nodePulse 3s ease-in-out infinite;
      transform-origin: 415px 12px;
      fill: var(--node-color);
    }
  </style>

  <!-- Pulsing divider line -->
  <line class="divider-line" x1="40" y1="12" x2="790" y2="12" stroke="url(#divGradient)" filter="url(#glow)" />
  
  <!-- Glowing center node -->
  <circle class="divider-node" cx="415" cy="12" r="4.5" filter="url(#glow)" />
</svg>
