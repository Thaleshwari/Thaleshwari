<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 260" width="100%" height="260">
  <defs>
    <!-- Dynamic Glowing Neon Gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E93" />
      <stop offset="40%" stop-color="#8A2BE2" />
      <stop offset="70%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#FF2E93" />
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="8s" 
        repeatCount="indefinite" />
    </linearGradient>

    <!-- Card Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Subtle Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    :root {
      --bg-color: url(#cardBg);
      --border-color: rgba(138, 43, 226, 0.15);
      --grid-color: rgba(138, 43, 226, 0.05);
      --text-primary: #ffffff;
      --text-secondary: #9aa5b5;
      --tag-bg: rgba(138, 43, 226, 0.15);
      --tag-text: #d8b4fe;
      --decor-opacity: 0.15;
    }
    
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f8fafc;
        --border-color: rgba(138, 43, 226, 0.1);
        --grid-color: rgba(138, 43, 226, 0.03);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --tag-bg: rgba(138, 43, 226, 0.08);
        --tag-text: #7c3aed;
        --decor-opacity: 0.08;
      }
    }

    /* Core Styles */
    .card {
      fill: var(--bg-color);
      stroke: var(--border-color);
      stroke-width: 1.5;
    }
    .grid {
      stroke: var(--grid-color);
      stroke-width: 1;
    }
    .title {
      font-family: 'Poppins', -apple-system, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: url(#neonGradient);
      filter: drop-shadow(0px 4px 10px rgba(138, 43, 226, 0.2));
    }
    .tag-rect {
      fill: var(--tag-bg);
    }
    .tag-text {
      font-family: 'Poppins', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.5px;
      fill: var(--tag-text);
    }
    .tagline {
      font-family: 'Poppins', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 15px;
      fill: var(--text-secondary);
    }
    .role-container {
      font-family: 'Poppins', -apple-system, sans-serif;
      font-weight: 600;
      font-size: 20px;
    }
    .code-decor {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      fill: url(#neonGradient);
      opacity: var(--decor-opacity);
    }

    /* Animations */
    @keyframes float-1 {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes float-2 {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(10px) rotate(-3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes float-3 {
      0% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(-5px) translateY(-5px); }
      100% { transform: translateX(0px) translateY(0px); }
    }
    @keyframes pulse-glow {
      0% { opacity: 0.1; }
      50% { opacity: 0.25; }
      100% { opacity: 0.1; }
    }
    
    /* Text switching animations */
    @keyframes role1 {
      0%, 28% { opacity: 0; transform: translateY(8px); }
      4%, 24% { opacity: 1; transform: translateY(0); }
      29%, 100% { opacity: 0; }
    }
    @keyframes role2 {
      0%, 33% { opacity: 0; transform: translateY(8px); }
      37%, 57% { opacity: 1; transform: translateY(0); }
      58%, 100% { opacity: 0; }
    }
    @keyframes role3 {
      0%, 66% { opacity: 0; transform: translateY(8px); }
      70%, 90% { opacity: 1; transform: translateY(0); }
      91%, 100% { opacity: 0; }
    }

    .f1 { animation: float-1 7s ease-in-out infinite; transform-origin: center; }
    .f2 { animation: float-2 9s ease-in-out infinite; transform-origin: center; }
    .f3 { animation: float-3 5s ease-in-out infinite; }
    .glow-blob { animation: pulse-glow 6s ease-in-out infinite; }
    
    .r1 { animation: role1 9s infinite; }
    .r2 { animation: role2 9s infinite; }
    .r3 { animation: role3 9s infinite; }
  </style>

  <!-- Card Body -->
  <rect class="card" width="828" height="258" rx="16" x="1" y="1" />

  <!-- Neon Glowing Ambient Blobs (Hidden/subtle in light mode via opacity variable) -->
  <circle class="glow-blob" cx="150" cy="80" r="140" fill="#8A2BE2" filter="url(#glow)" />
  <circle class="glow-blob" cx="680" cy="180" r="110" fill="#00F0FF" filter="url(#glow)" />

  <!-- Decorative Matrix-style grid lines -->
  <g class="grid">
    <!-- Horizontal -->
    <path d="M 1,40 H 829 M 1,80 H 829 M 1,120 H 829 M 1,160 H 829 M 1,200 H 829" />
    <!-- Vertical -->
    <path d="M 60,1 V 259 M 120,1 V 259 M 180,1 V 259 M 710,1 V 259 M 770,1 V 259" />
  </g>

  <!-- Left Accent Bar -->
  <rect x="1" y="1" width="6" height="258" rx="3" fill="url(#neonGradient)" />

  <!-- Floating Coding Symbols -->
  <text class="code-decor f1" x="730" y="70" font-size="52">{ }</text>
  <text class="code-decor f2" x="650" y="190" font-size="34">&lt;/&gt;</text>
  <text class="code-decor f1" x="90" y="210" font-size="28">[ ]</text>
  <text class="code-decor f3" x="750" y="150" font-size="24">#</text>
  <text class="code-decor f3" x="140" y="50" font-size="20">$/</text>

  <!-- Decorative Circuit Node -->
  <g class="f2" transform="translate(680, 110)" opacity="0.3">
    <circle cx="0" cy="0" r="6" fill="#00F0FF" />
    <path d="M 0,0 L 20,-20 L 50,-20" stroke="#00F0FF" stroke-width="1.5" fill="none" />
    <circle cx="50" cy="-20" r="3" fill="#00F0FF" />
    <path d="M 0,0 L 15,15 L 40,15" stroke="#00F0FF" stroke-width="1.5" fill="none" />
    <circle cx="40" cy="15" r="3" fill="#00F0FF" />
  </g>

  <!-- Main Info Block -->
  <g transform="translate(70, 75)">
    <!-- Animated Status Tag -->
    <g transform="translate(0, -35)">
      <rect class="tag-rect" width="165" height="24" rx="12" />
      <!-- Pulsing Node inside Tag -->
      <circle cx="15" cy="12" r="4" fill="#00F0FF">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
      </circle>
      <text class="tag-text" x="28" y="16">HELLO WORLD • PORTFOLIO</text>
    </g>

    <!-- Name Header -->
    <text class="title" x="0" y="32">Thaleshwari J</text>
    
    <!-- Animated Switching Roles -->
    <g class="role-container" transform="translate(0, 72)">
      <text class="r1" x="0" y="0" fill="#00F0FF">🚀 Full Stack Developer</text>
      <text class="r2" x="0" y="0" fill="#FF2E93">🧠 DSA Enthusiast (300+ Solved)</text>
      <text class="r3" x="0" y="0" fill="#8A2BE2">🏃 State-Level Athlete &amp; Builder</text>
    </g>

    <!-- Constant tech line -->
    <text class="tagline" x="0" y="105">Building scalable systems with Java, Spring Boot &amp; MERN Stack</text>
  </g>
</svg>
